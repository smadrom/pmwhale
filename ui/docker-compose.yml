services:
  pmwhale-ui:
    build:
      context: ..
      dockerfile: ui/Dockerfile
    image: pmwhale-ui:latest
    ports:
      - "127.0.0.1:5178:5178"
    volumes:
      - ${PMWHALE_DB:-../pmwhale.db}:/data/pmwhale.db:ro
    environment:
      PORT: "5178"
      DB_PATH: /data/pmwhale.db
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=16m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
