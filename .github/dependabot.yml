version: 2
updates:
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
    groups:
      python-dependencies:
        patterns: ["*"]

  - package-ecosystem: bun
    directory: /ui
    schedule:
      interval: weekly
    groups:
      ui-dependencies:
        patterns: ["*"]

  - package-ecosystem: docker
    directory: /ui
    schedule:
      interval: weekly

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
