name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.14"
          enable-cache: true
      - name: Install locked dependencies
        run: uv sync --extra dev --locked
      - name: Check formatting
        run: uv run --no-sync ruff format --check .
      - name: Lint
        run: uv run --no-sync ruff check .
      - name: Test
        run: uv run --no-sync pytest

  package:
    name: Python package
    needs: python
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.14"
          enable-cache: true
      - name: Build and inspect distributions
        run: |
          uv sync --extra dev --locked
          uv build
          uv run --no-sync twine check dist/*
          cd dist
          sha256sum pmwhale-* > SHA256SUMS
      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pmwhale-python-dist
          path: dist/*
          if-no-files-found: error

  ui:
    name: UI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ui
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.14"
      - name: Install locked dependencies
        run: bun install --frozen-lockfile
      - name: Type-check and build
        run: bun run check
      - name: Verify third-party license notices
        run: |
          bun run licenses
          git diff --exit-code -- THIRD_PARTY_LICENSES.txt
          bun run licenses:allowlist

  container:
    name: Docker image
    needs: ui
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Create smoke-test database
        run: |
          python3 - <<'PY'
          import sqlite3

          with sqlite3.connect("pmwhale-smoke.db") as connection:
              connection.execute(
                  """
                  CREATE TABLE trades (
                      wallet TEXT NOT NULL,
                      tx_hash TEXT NOT NULL,
                      timestamp INTEGER NOT NULL,
                      market TEXT,
                      asset TEXT NOT NULL,
                      side TEXT,
                      outcome TEXT,
                      price REAL,
                      size REAL,
                      usd REAL
                  )
                  """
              )
          PY
      - name: Build container image
        run: docker build --file ui/Dockerfile --tag pmwhale-ui:ci .
      - name: Run container smoke test
        run: |
          docker run --detach --name pmwhale-ui-smoke \
            --publish 127.0.0.1:5178:5178 \
            --mount "type=bind,src=$PWD/pmwhale-smoke.db,dst=/data/pmwhale.db,readonly" \
            pmwhale-ui:ci
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:5178/api/health >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              docker logs pmwhale-ui-smoke
              exit 1
            fi
            sleep 1
          done
          curl --fail --silent http://127.0.0.1:5178/api/stats \
            | python3 -c 'import json, sys; assert json.load(sys.stdin)["trades"] == 0'
      - name: Show logs and clean up
        if: always()
        run: |
          docker logs pmwhale-ui-smoke || true
          docker rm --force pmwhale-ui-smoke || true
