name: Draft release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing annotated tag to package (for example v0.1.0)
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out tagged source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.14"
          enable-cache: true
      - name: Validate tag and build distributions
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re
          import tomllib

          tag = os.environ["RELEASE_TAG"]
          if not re.fullmatch(r"v\d+\.\d+\.\d+", tag):
              raise SystemExit(f"invalid release tag: {tag}")
          version = tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"]
          if tag != f"v{version}":
              raise SystemExit(f"tag {tag} does not match project version {version}")
          PY
          test "$(git cat-file -t "$RELEASE_TAG")" = "tag" || {
            echo "release tag must be annotated" >&2
            exit 1
          }
          uv sync --extra dev --locked
          uv run --no-sync ruff format --check .
          uv run --no-sync ruff check .
          uv run --no-sync pytest
          uv build
          uv run --no-sync twine check dist/*
          cd dist
          sha256sum pmwhale-* > SHA256SUMS
      - name: Upload verified distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pmwhale-release-dist
          path: dist/*
          if-no-files-found: error

  draft:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: read
      contents: write
    steps:
      - name: Download verified distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pmwhale-release-dist
          path: dist
      - name: Create draft GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: >-
          gh release create "$RELEASE_TAG" dist/*
          --draft --generate-notes --verify-tag
          --title "pmwhale ${RELEASE_TAG}"
